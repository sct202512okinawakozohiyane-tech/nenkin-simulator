spring.application.name=PensionStartingSimulator
server.port=${PORT:8080}

# 静的ファイルをソースディレクトリから直接配信（再起動不要でブラウザリロードだけで反映）
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/

# DevTools: 静的ファイル変更時はアプリ再起動をスキップ（静的ファイルのみの変更に対応）
spring.devtools.restart.exclude=static/**,public/**
